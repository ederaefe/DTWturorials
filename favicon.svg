<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Neubrutalist base block shadow -->
  <rect x="10" y="10" width="80" height="80" fill="#0A1628" rx="0" />
  <!-- Main brand colored container -->
  <rect x="6" y="6" width="80" height="80" fill="#FF6B35" stroke="#0A1628" stroke-width="5" rx="0" />
  
  <!-- Stylized graduation mortarboard top / Arrow representing Victory -->
  <path d="M 46 22 L 72 35 L 46 48 L 20 35 Z" fill="#00E699" stroke="#0A1628" stroke-width="4.5" stroke-linejoin="round" />
  <!-- Cap skull portion / D-loop base -->
  <path d="M 31 41 L 31 53 C 31 63, 61 63, 61 53 L 61 41" fill="none" stroke="#0A1628" stroke-width="4.5" stroke-linecap="round" />
  <!-- Victory Star/Sparkle -->
  <path d="M 46 42 L 49 50 L 57 50 L 50 54 L 53 62 L 46 57 L 39 62 L 42 54 L 35 50 L 43 50 Z" fill="#FFB020" stroke="#0A1628" stroke-width="2" stroke-linejoin="round" />
  
  <!-- Mini tassel -->
  <path d="M 72 35 L 78 46 L 78 54" fill="none" stroke="#0A1628" stroke-width="2.5" stroke-linecap="round" />
</svg>
